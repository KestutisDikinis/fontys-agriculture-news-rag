sources:
  - id: eu_agri_newsroom_news
    name: European Commission Agriculture Newsroom - News
    kind: rss
    url: https://ec.europa.eu/newsroom/agri/feed?item_type_id=994&lang=en&orderby=item_date
    homepage: https://agriculture.ec.europa.eu/media_en
    jurisdiction: EU
    country: EU
    language: en
    category: official_news
    reliability: official
    tags:
      - eu
      - cap
      - agriculture
      - rural-development
      - policy
    fetch_interval_minutes: 360
    notes: Official EU agriculture newsroom feed. Good for policy, CAP, market, and rural-development announcements.

